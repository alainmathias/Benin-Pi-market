<!-- ============================================
     STATISTIQUES AVANCÉES - À INTÉGRER DANS LE DASHBOARD ADMIN
     ============================================ -->

<div class="bg-white rounded-2xl shadow-card p-6 mt-8">
    <h3 class="text-xl font-bold text-dark mb-6">
        <i class="fas fa-chart-line text-primary-500 mr-2"></i> Statistiques avancées
    </h3>

    <!-- Évolution mensuelle -->
    <div class="mb-8">
        <h4 class="font-semibold text-dark mb-3">Évolution mensuelle</h4>
        <div id="monthlyChart" class="bg-gray-50 rounded-xl p-4">
            <div class="text-center py-8 text-gray-500">
                <i class="fas fa-spinner fa-spin text-2xl block mb-2"></i>
                Chargement des données...
            </div>
        </div>
    </div>

    <!-- Top vendeurs -->
    <div>
        <h4 class="font-semibold text-dark mb-3">Top vendeurs</h4>
        <div id="topSellersList" class="space-y-2">
            <div class="text-center py-4 text-gray-500">
                <i class="fas fa-spinner fa-spin text-2xl block mb-2"></i>
                Chargement...
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { getGlobalStats, renderBarChart } from '../js/stats.js';

    async function loadStats() {
        try {
            const stats = await getGlobalStats();
            if (!stats) {
                document.getElementById('monthlyChart').innerHTML = `
                    <p class="text-center text-red-500">Erreur de chargement des statistiques</p>
                `;
                return;
            }

            // Graphique mensuel
            if (stats.monthly && stats.monthly.length > 0) {
                const chartData = stats.monthly.map(m => ({
                    label: m.month,
                    value: m.products
                }));
                
                document.getElementById('monthlyChart').innerHTML = renderBarChart(chartData, {
                    height: '250px',
                    barColor: '#1a73e8',
                    label: 'Produits publiés'
                });
            } else {
                document.getElementById('monthlyChart').innerHTML = `
                    <p class="text-center text-gray-500">Aucune donnée mensuelle disponible</p>
                `;
            }

            // Top vendeurs
            if (stats.topSellers && stats.topSellers.length > 0) {
                document.getElementById('topSellersList').innerHTML = stats.topSellers.map((seller, index) => `
                    <div class="flex items-center justify-between p-3 bg-gray-50 rounded-xl">
                        <div class="flex items-center gap-3">
                            <span class="w-6 h-6 bg-primary-100 rounded-full flex items-center justify-center text-primary-500 font-bold text-sm">
                                ${index + 1}
                            </span>
                            <div>
                                <span class="font-medium text-dark">${seller.sellerName}</span>
                                <span class="text-sm text-gray-500 ml-2">${seller.products} produits</span>
                            </div>
                        </div>
                        <span class="text-sm text-primary-500 font-semibold">${seller.views} vues</span>
                    </div>
                `).join('');
            } else {
                document.getElementById('topSellersList').innerHTML = `
                    <p class="text-center text-gray-500">Aucun vendeur actif</p>
                `;
            }

        } catch (error) {
            console.error('Erreur chargement stats:', error);
        }
    }

    loadStats();
</script>
