<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services - Bénin Pi Market</title>
    
    <!-- ========== TAILWIND CSS ========== -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- ========== FONT AWESOME ========== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- ========== GOOGLE FONTS ========== -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- ========== STYLES PERSONNALISÉS ========== -->
    <link rel="stylesheet" href="../css/style.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 500: '#1a73e8', 600: '#1557b0', 700: '#104080' },
                        secondary: { 500: '#ff6b00', 600: '#cc5500' },
                        pi: { 50: '#fef9e7', 500: '#f9a825', 600: '#f57f17' },
                        service: { 500: '#8b5cf6', 600: '#7c3aed', 100: '#ede9fe' },
                        delivery: { 500: '#06b6d4', 600: '#0891b2', 100: '#cffafe' }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .service-card {
            transition: all 0.3s ease;
        }
        .service-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        .tab-btn {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .tab-btn.active {
            background: #1a73e8;
            color: white;
            box-shadow: 0 4px 14px 0 rgba(26, 115, 232, 0.39);
        }
        .tab-btn:not(.active) {
            background: #f3f4f6;
            color: #6b7280;
        }
        .tab-btn:not(.active):hover {
            background: #e5e7eb;
        }
        .badge-provider {
            background: #ede9fe;
            color: #7c3aed;
        }
        .badge-deliverer {
            background: #cffafe;
            color: #0891b2;
        }
        .status-badge {
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: 600;
        }
        .status-badge.active { background: #d4edda; color: #155724; }
        .status-badge.pending { background: #fff3cd; color: #856404; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen flex flex-col">

    <!-- ========== HEADER ========== -->
    <header class="bg-white shadow-md sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="../index.html" class="flex items-center gap-2 group">
                <div class="w-10 h-10 bg-primary-500 rounded-xl flex items-center justify-center text-white font-bold text-lg transition group-hover:scale-105">BP</div>
                <span class="text-2xl font-bold text-primary-500">Bénin Pi Market</span>
            </a>
            <div class="flex items-center gap-4">
                <a href="../index.html" class="text-gray-600 hover:text-primary-500 transition">
                    <i class="fas fa-arrow-left mr-2"></i> Accueil
                </a>
                <a href="#" onclick="window.location.href='../auth/login.html'" class="text-gray-600 hover:text-primary-500 transition">
                    <i class="fas fa-user"></i>
                </a>
            </div>
        </nav>
    </header>

    <!-- ========== CONTENU PRINCIPAL ========== -->
    <div class="flex-1 max-w-7xl mx-auto px-4 py-6 w-full">

        <!-- En-tête -->
        <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-6">
            <div>
                <h1 class="text-3xl font-bold text-dark">
                    <i class="fas fa-handshake text-primary-500"></i> Services
                </h1>
                <p class="text-gray-500 mt-1">Trouvez des prestataires et livreurs près de chez vous</p>
            </div>
            <div class="flex items-center gap-3 mt-4 md:mt-0">
                <div class="hidden sm:flex items-center gap-1 bg-pi-50 px-3 py-1 rounded-full border border-pi-100">
                    <span class="text-pi-500 font-bold text-xs">π</span>
                    <span class="text-xs text-gray-600" id="piRateDisplay">1 Pi = 1.000 FCFA</span>
                </div>
            </div>
        </div>

        <!-- Alertes -->
        <div id="alert-container"></div>

        <!-- ========== ONGLETS ========== -->
        <div class="flex gap-3 mb-6 overflow-x-auto no-scrollbar">
            <button onclick="switchServiceTab('providers')" class="tab-btn active px-6 py-2.5 rounded-xl font-medium text-sm whitespace-nowrap" data-tab="providers">
                <i class="fas fa-tools mr-2"></i> Prestataires
                <span class="ml-1 text-xs bg-white/30 px-2 py-0.5 rounded-full" id="providersCount">0</span>
            </button>
            <button onclick="switchServiceTab('deliverers')" class="tab-btn px-6 py-2.5 rounded-xl font-medium text-sm whitespace-nowrap" data-tab="deliverers">
                <i class="fas fa-truck mr-2"></i> Livreurs
                <span class="ml-1 text-xs bg-white/30 px-2 py-0.5 rounded-full" id="deliverersCount">0</span>
            </button>
        </div>

        <!-- ========== FILTRES ========== -->
        <div class="bg-white rounded-2xl shadow-card p-4 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        <i class="fas fa-map-marker-alt text-primary-500 mr-1"></i> Ville
                    </label>
                    <select id="cityFilter" class="input-field w-full" onchange="applyFilters()">
                        <option value="">Toutes les villes</option>
                        <option value="Cotonou">Cotonou</option>
                        <option value="Porto-Novo">Porto-Novo</option>
                        <option value="Parakou">Parakou</option>
                        <option value="Abomey-Calavi">Abomey-Calavi</option>
                        <option value="Bohicon">Bohicon</option>
                        <option value="Kandi">Kandi</option>
                        <option value="Natitingou">Natitingou</option>
                        <option value="Ouidah">Ouidah</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        <i class="fas fa-tag text-primary-500 mr-1"></i> Catégorie
                    </label>
                    <select id="categoryFilter" class="input-field w-full" onchange="applyFilters()">
                        <option value="">Toutes</option>
                        <option value="plomberie">🔧 Plomberie</option>
                        <option value="electricite">⚡ Électricité</option>
                        <option value="menage">🧹 Ménage</option>
                        <option value="jardinage">🌿 Jardinage</option>
                        <option value="informatique">💻 Informatique</option>
                        <option value="cours">📚 Cours particuliers</option>
                        <option value="coiffure">💇 Coiffure</option>
                        <option value="mecanique">🔧 Mécanique</option>
                        <option value="livraison">📦 Livraison</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        <i class="fas fa-star text-primary-500 mr-1"></i> Note minimum
                    </label>
                    <select id="ratingFilter" class="input-field w-full" onchange="applyFilters()">
                        <option value="0">Toutes les notes</option>
                        <option value="4">⭐ 4+ étoiles</option>
                        <option value="3">⭐ 3+ étoiles</option>
                        <option value="2">⭐ 2+ étoiles</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        <i class="fas fa-search text-primary-500 mr-1"></i> Recherche
                    </label>
                    <input type="text" id="searchInput" placeholder="Nom, profession..." 
                           class="input-field w-full" oninput="applyFilters()">
                </div>
            </div>
            <div class="flex justify-end mt-3">
                <button onclick="clearFilters()" class="text-sm text-gray-500 hover:text-primary-500 transition">
                    <i class="fas fa-undo mr-1"></i> Réinitialiser
                </button>
            </div>
        </div>

        <!-- ========== RÉSULTATS ========== -->
        <div id="servicesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-12 text-gray-500">
                <i class="fas fa-spinner fa-spin text-3xl block mb-2"></i>
                Chargement des services...
            </div>
        </div>

        <!-- ========== PAGINATION ========== -->
        <div id="paginationContainer" class="flex justify-center mt-8"></div>

    </div>

    <!-- ========== FOOTER ========== -->
    <footer class="bg-dark text-white py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-sm text-gray-400">&copy; 2026 Bénin Pi Market - Services</p>
        </div>
    </footer>

    <!-- ========== JAVASCRIPT ========== -->
    <script type="module">
        import { auth, db, collection, getDocs, query, where, doc, getDoc, onAuthStateChanged } from '../js/firebase-config.js';
        import { showAlert, formatDate, logout } from '../js/utils.js';
        import { getExchangeRate } from '../js/pi-utils.js';

        window.logout = logout;

        // ============================================
        // ÉTAT
        // ============================================
        let currentTab = 'providers';
        let allProviders = [];
        let allDeliverers = [];
        let filteredResults = [];
        let currentPage = 1;
        const itemsPerPage = 9;

        // ============================================
        // TAUX PI
        // ============================================
        try {
            const rate = getExchangeRate();
            const piDisplay = document.getElementById('piRateDisplay');
            if (piDisplay) {
                piDisplay.textContent = `1 Pi = ${rate.toLocaleString()} FCFA`;
            }
        } catch (e) {
            console.warn('Erreur chargement taux Pi:', e);
        }

        // ============================================
        // CHARGER LES SERVICES
        // ============================================
        async function loadServices() {
            try {
                // Charger les prestataires (isServiceProvider = true)
                const qProviders = query(
                    collection(db, 'users'),
                    where('isServiceProvider', '==', true)
                );
                const providersSnap = await getDocs(qProviders);
                allProviders = [];
                providersSnap.forEach((doc) => {
                    allProviders.push({ id: doc.id, ...doc.data() });
                });

                // Charger les livreurs (isDelivery = true)
                const qDeliverers = query(
                    collection(db, 'users'),
                    where('isDelivery', '==', true)
                );
                const deliverersSnap = await getDocs(qDeliverers);
                allDeliverers = [];
                deliverersSnap.forEach((doc) => {
                    allDeliverers.push({ id: doc.id, ...doc.data() });
                });

                // Mettre à jour les compteurs
                document.getElementById('providersCount').textContent = allProviders.length;
                document.getElementById('deliverersCount').textContent = allDeliverers.length;

                // Afficher l'onglet actif
                renderServices();

            } catch (error) {
                console.error('Erreur chargement services:', error);
                showAlert('Erreur lors du chargement des services.', 'danger');
                document.getElementById('servicesContainer').innerHTML = `
                    <div class="col-span-full text-center py-12 text-red-500">
                        <i class="fas fa-exclamation-circle text-4xl block mb-2"></i>
                        <p>Erreur de chargement</p>
                        <button onclick="loadServices()" class="btn-primary mt-4 inline-block text-sm">
                            <i class="fas fa-redo mr-2"></i> Réessayer
                        </button>
                    </div>
                `;
            }
        }

        // ============================================
        // CHANGER D'ONGLET
        // ============================================
        window.switchServiceTab = function(tab) {
            currentTab = tab;
            currentPage = 1;
            
            // Mettre à jour les boutons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            const activeBtn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
            if (activeBtn) {
                activeBtn.classList.add('active');
            }

            renderServices();
        };

        // ============================================
        // APPLIQUER LES FILTRES
        // ============================================
        window.applyFilters = function() {
            currentPage = 1;
            renderServices();
        };

        window.clearFilters = function() {
            document.getElementById('cityFilter').value = '';
            document.getElementById('categoryFilter').value = '';
            document.getElementById('ratingFilter').value = '0';
            document.getElementById('searchInput').value = '';
            currentPage = 1;
            renderServices();
        };

        // ============================================
        // AFFICHER LES SERVICES
        // ============================================
        function renderServices() {
            const container = document.getElementById('servicesContainer');
            
            // Sélectionner la bonne liste
            let source = currentTab === 'providers' ? allProviders : allDeliverers;
            
            // Appliquer les filtres
            const city = document.getElementById('cityFilter').value;
            const category = document.getElementById('categoryFilter').value;
            const rating = parseInt(document.getElementById('ratingFilter').value);
            const search = document.getElementById('searchInput').value.toLowerCase().trim();

            filteredResults = source.filter(item => {
                // Filtre ville
                if (city && item.ville !== city) return false;
                
                // Filtre recherche
                if (search) {
                    const name = `${item.prenom || ''} ${item.nom || ''}`.toLowerCase();
                    const profession = (item.profession || '').toLowerCase();
                    const services = (item.services || '').toLowerCase();
                    if (!name.includes(search) && !profession.includes(search) && !services.includes(search)) {
                        return false;
                    }
                }
                
                // Filtre catégorie (pour prestataires)
                if (currentTab === 'providers' && category) {
                    const itemCategory = (item.serviceCategory || item.profession || '').toLowerCase();
                    if (!itemCategory.includes(category.toLowerCase())) return false;
                }
                
                // Filtre note (à implémenter avec les avis)
                // Pour l'instant, on passe
                
                return true;
            });

            // Pagination
            const total = filteredResults.length;
            const totalPages = Math.ceil(total / itemsPerPage);
            const start = (currentPage - 1) * itemsPerPage;
            const end = Math.min(start + itemsPerPage, total);
            const pageItems = filteredResults.slice(start, end);

            // Mettre à jour les compteurs d'onglets
            document.getElementById('providersCount').textContent = allProviders.length;
            document.getElementById('deliverersCount').textContent = allDeliverers.length;

            if (pageItems.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <i class="fas fa-search text-5xl text-gray-300 block mb-4"></i>
                        <p class="text-gray-500">Aucun ${currentTab === 'providers' ? 'prestataire' : 'livreur'} trouvé</p>
                        <p class="text-sm text-gray-400 mt-1">Essayez de modifier vos filtres</p>
                        <button onclick="clearFilters()" class="btn-primary mt-4 inline-block text-sm">
                            <i class="fas fa-undo mr-2"></i> Réinitialiser les filtres
                        </button>
                    </div>
                `;
                renderPagination(totalPages);
                return;
            }

            container.innerHTML = pageItems.map(item => `
                <div class="bg-white rounded-2xl shadow-card hover:shadow-card-hover overflow-hidden transition-all duration-300 service-card">
                    <div class="p-5">
                        <div class="flex items-start gap-4">
                            <!-- Avatar -->
                            <div class="w-16 h-16 bg-gray-200 rounded-full flex items-center justify-center text-2xl flex-shrink-0">
                                ${item.photoURL 
                                    ? `<img src="${item.photoURL}" class="w-full h-full object-cover rounded-full">`
                                    : currentTab === 'providers' ? '🛠️' : '🚚'
                                }
                            </div>
                            <div class="flex-1 min-w-0">
                                <h3 class="font-bold text-dark text-lg">${item.prenom || ''} ${item.nom || ''}</h3>
                                <div class="flex flex-wrap gap-1 mt-1">
                                    <span class="text-xs ${currentTab === 'providers' ? 'badge-provider' : 'badge-deliverer'} px-2 py-0.5 rounded-full">
                                        ${currentTab === 'providers' ? '🛠️ Prestataire' : '🚚 Livreur'}
                                    </span>
                                    ${item.status === 'active' ? `
                                        <span class="text-xs status-badge active">✅ Actif</span>
                                    ` : `
                                        <span class="text-xs status-badge pending">⏳ En attente</span>
                                    `}
                                </div>
                                <div class="flex items-center gap-2 mt-1 text-sm text-gray-500">
                                    <span><i class="fas fa-map-marker-alt text-primary-500"></i> ${item.ville || 'Non spécifié'}</span>
                                    <span>•</span>
                                    <span><i class="far fa-calendar"></i> ${formatDate(item.createdAt)}</span>
                                </div>
                                ${item.profession ? `
                                    <p class="text-sm text-gray-600 mt-1">
                                        <i class="fas fa-briefcase text-gray-400 mr-1"></i> ${item.profession}
                                    </p>
                                ` : ''}
                            </div>
                        </div>

                        <!-- Services proposés -->
                        ${currentTab === 'providers' && item.services ? `
                            <div class="mt-3 p-3 bg-service-100 rounded-xl">
                                <p class="text-sm text-service-700">
                                    <i class="fas fa-tools text-service-500 mr-1"></i>
                                    ${item.services}
                                </p>
                            </div>
                        ` : ''}

                        ${currentTab === 'deliverers' && item.deliveryInfo ? `
                            <div class="mt-3 p-3 bg-delivery-100 rounded-xl">
                                <p class="text-sm text-delivery-700">
                                    <i class="fas fa-truck text-delivery-500 mr-1"></i>
                                    ${item.deliveryInfo}
                                </p>
                            </div>
                        ` : ''}

                        <!-- Zone contact -->
                        <div class="mt-4 flex gap-2">
                            <a href="https://wa.me/${item.whatsapp?.replace(/\s/g, '').replace(/^\+/, '')}?text=${encodeURIComponent(
                                `Bonjour, je vous contacte depuis Bénin Pi Market. Je souhaite faire appel à vos services.`
                            )}" 
                               target="_blank"
                               class="flex-1 bg-green-500 hover:bg-green-600 text-white py-2.5 rounded-xl font-semibold transition text-sm flex items-center justify-center gap-2">
                                <i class="fab fa-whatsapp"></i> Contacter
                            </a>
                            <button onclick="viewProfile('${item.uid || item.id}')" class="btn-outline text-sm px-4 py-2.5">
                                <i class="fas fa-user"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');

            renderPagination(totalPages);
        }

        // ============================================
        // PAGINATION
        // ============================================
        function renderPagination(totalPages) {
            const container = document.getElementById('paginationContainer');
            
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '<div class="flex gap-1">';
            
            // Précédent
            html += `
                <button onclick="goToPage(${currentPage - 1})" 
                        class="px-3 py-2 rounded-lg text-sm ${currentPage === 1 ? 'text-gray-300 cursor-not-allowed' : 'hover:bg-gray-100 text-gray-700'} transition"
                        ${currentPage === 1 ? 'disabled' : ''}>
                    <i class="fas fa-chevron-left"></i>
                </button>
            `;

            // Pages
            const maxVisible = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
            let endPage = Math.min(totalPages, startPage + maxVisible - 1);
            
            if (endPage - startPage < maxVisible - 1) {
                startPage = Math.max(1, endPage - maxVisible + 1);
            }

            if (startPage > 1) {
                html += `<button onclick="goToPage(1)" class="px-3 py-2 rounded-lg text-sm hover:bg-gray-100 text-gray-700 transition">1</button>`;
                if (startPage > 2) html += `<span class="px-2 text-gray-400">...</span>`;
            }

            for (let i = startPage; i <= endPage; i++) {
                html += `
                    <button onclick="goToPage(${i})" 
                            class="px-3 py-2 rounded-lg text-sm transition ${i === currentPage ? 'bg-primary-500 text-white' : 'hover:bg-gray-100 text-gray-700'}">
                        ${i}
                    </button>
                `;
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) html += `<span class="px-2 text-gray-400">...</span>`;
                html += `<button onclick="goToPage(${totalPages})" class="px-3 py-2 rounded-lg text-sm hover:bg-gray-100 text-gray-700 transition">${totalPages}</button>`;
            }

            // Suivant
            html += `
                <button onclick="goToPage(${currentPage + 1})" 
                        class="px-3 py-2 rounded-lg text-sm ${currentPage === totalPages ? 'text-gray-300 cursor-not-allowed' : 'hover:bg-gray-100 text-gray-700'} transition"
                        ${currentPage === totalPages ? 'disabled' : ''}>
                    <i class="fas fa-chevron-right"></i>
                </button>
            `;

            html += '</div>';
            container.innerHTML = html;
        }

        // ============================================
        // CHANGER DE PAGE
        // ============================================
        window.goToPage = function(page) {
            const total = filteredResults.length;
            const totalPages = Math.ceil(total / itemsPerPage);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderServices();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // ============================================
        // VOIR LE PROFIL
        // ============================================
        window.viewProfile = function(userId) {
            window.location.href = `../user/public-profile.html?id=${userId}`;
        };

        // ============================================
        // AUTHENTIFICATION
        // ============================================
        onAuthStateChanged(auth, (user) => {
            // Gestion du menu si nécessaire
        });

        // ============================================
        // INITIALISATION
        // ============================================
        loadServices();

        console.log('✅ Page Services chargée avec succès !');
    </script>
</body>
</html>
