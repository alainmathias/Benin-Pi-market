<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil public - Bénin Pi Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .profile-header {
            background: linear-gradient(135deg, #1a73e8, #104080);
        }
        .badge-provider { background: #ede9fe; color: #7c3aed; }
        .badge-deliverer { background: #cffafe; color: #0891b2; }
        .badge-vendor { background: #dbeafe; color: #1a73e8; }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">

    <header class="bg-white shadow-md sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="../index.html" class="flex items-center gap-2">
                <div class="w-10 h-10 bg-primary-500 rounded-xl flex items-center justify-center text-white font-bold text-lg">BP</div>
                <span class="text-2xl font-bold text-primary-500">Bénin Pi Market</span>
            </a>
            <a href="../services/list.html" class="text-gray-600 hover:text-primary-500 transition">
                <i class="fas fa-arrow-left mr-2"></i> Retour
            </a>
        </nav>
    </header>

    <div class="flex-1 max-w-4xl mx-auto px-4 py-8 w-full" id="profileContainer">
        <div class="text-center py-16">
            <div class="spinner mx-auto"></div>
            <p class="mt-4 text-gray-500">Chargement du profil...</p>
        </div>
    </div>

    <footer class="bg-dark text-white py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-sm text-gray-400">&copy; 2026 Bénin Pi Market</p>
        </div>
    </footer>

    <script type="module">
        import { auth, db, doc, getDoc, collection, query, where, getDocs, onAuthStateChanged } from '../js/firebase-config.js';
        import { formatDate } from '../js/utils.js';

        const params = new URLSearchParams(window.location.search);
        const userId = params.get('id');

        async function loadProfile() {
            if (!userId) {
                document.getElementById('profileContainer').innerHTML = `
                    <div class="text-center py-16 text-red-500">
                        <i class="fas fa-exclamation-circle text-6xl block mb-4"></i>
                        <p>Utilisateur non trouvé</p>
                    </div>
                `;
                return;
            }

            try {
                const userDoc = await getDoc(doc(db, 'users', userId));
                if (!userDoc.exists()) {
                    document.getElementById('profileContainer').innerHTML = `
                        <div class="text-center py-16 text-red-500">
                            <i class="fas fa-user-slash text-6xl block mb-4"></i>
                            <p>Ce profil n'existe pas</p>
                        </div>
                    `;
                    return;
                }

                const user = userDoc.data();
                const userRoles = await getUserRoles(userId);

                renderProfile(user, userRoles);

            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('profileContainer').innerHTML = `
                    <div class="text-center py-16 text-red-500">
                        <i class="fas fa-exclamation-circle text-6xl block mb-4"></i>
                        <p>Erreur de chargement</p>
                    </div>
                `;
            }
        }

        async function getUserRoles(userId) {
            try {
                const q = query(
                    collection(db, 'user_roles'),
                    where('userId', '==', userId),
                    where('status', '==', 'active')
                );
                const snapshot = await getDocs(q);
                const roles = [];
                for (const doc of snapshot.docs) {
                    const data = doc.data();
                    const roleDoc = await getDoc(doc(db, 'roles', data.roleId));
                    if (roleDoc.exists()) {
                        roles.push(roleDoc.data());
                    }
                }
                return roles;
            } catch {
                return [];
            }
        }

        function renderProfile(user, roles) {
            const roleBadges = {
                'vendor': '<span class="badge-vendor px-3 py-1 rounded-full text-xs font-medium">🏪 Vendeur</span>',
                'delivery': '<span class="badge-deliverer px-3 py-1 rounded-full text-xs font-medium">🚚 Livreur</span>',
                'service_provider': '<span class="badge-provider px-3 py-1 rounded-full text-xs font-medium">🛠️ Prestataire</span>'
            };

            const roleList = roles.map(r => roleBadges[r.slug] || '').join('');

            document.getElementById('profileContainer').innerHTML = `
                <div class="bg-white rounded-2xl shadow-card overflow-hidden">
                    <!-- Bannière -->
                    <div class="profile-header h-32 relative">
                        <div class="absolute -bottom-12 left-8">
                            <div class="w-24 h-24 bg-white rounded-full border-4 border-white shadow-lg flex items-center justify-center text-4xl">
                                ${user.photoURL ? `<img src="${user.photoURL}" class="w-full h-full rounded-full object-cover">` : '👤'}
                            </div>
                        </div>
                    </div>

                    <!-- Infos -->
                    <div class="pt-16 pb-6 px-8">
                        <div class="flex flex-col md:flex-row md:items-center md:justify-between">
                            <div>
                                <h1 class="text-2xl font-bold text-dark">${user.prenom || ''} ${user.nom || ''}</h1>
                                <div class="flex flex-wrap gap-2 mt-2">
                                    ${roleList}
                                </div>
                            </div>
                            <a href="https://wa.me/${user.whatsapp?.replace(/\s/g, '').replace(/^\+/, '')}?text=${encodeURIComponent('Bonjour, je vous contacte depuis Bénin Pi Market.')}" 
                               target="_blank"
                               class="bg-green-500 hover:bg-green-600 text-white px-6 py-2.5 rounded-xl font-semibold transition flex items-center gap-2 mt-4 md:mt-0">
                                <i class="fab fa-whatsapp"></i> Contacter
                            </a>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
                            <div class="bg-gray-50 rounded-xl p-4">
                                <p class="text-xs text-gray-400 uppercase font-semibold">📍 Localisation</p>
                                <p class="font-medium">${user.ville || 'Non spécifié'}</p>
                            </div>
                            <div class="bg-gray-50 rounded-xl p-4">
                                <p class="text-xs text-gray-400 uppercase font-semibold">📞 Contact</p>
                                <p class="font-medium">${user.telephone || '-'}</p>
                            </div>
                            ${user.profession ? `
                                <div class="bg-gray-50 rounded-xl p-4">
                                    <p class="text-xs text-gray-400 uppercase font-semibold">💼 Profession</p>
                                    <p class="font-medium">${user.profession}</p>
                                </div>
                            ` : ''}
                            <div class="bg-gray-50 rounded-xl p-4">
                                <p class="text-xs text-gray-400 uppercase font-semibold">📅 Membre depuis</p>
                                <p class="font-medium">${formatDate(user.createdAt)}</p>
                            </div>
                        </div>

                        ${user.services ? `
                            <div class="mt-6 p-4 bg-service-50 rounded-xl border border-service-200">
                                <h3 class="font-semibold text-service-700">
                                    <i class="fas fa-tools mr-2"></i> Services proposés
                                </h3>
                                <p class="text-service-600 mt-1">${user.services}</p>
                            </div>
                        ` : ''}

                        ${user.deliveryInfo ? `
                            <div class="mt-4 p-4 bg-delivery-50 rounded-xl border border-delivery-200">
                                <h3 class="font-semibold text-delivery-700">
                                    <i class="fas fa-truck mr-2"></i> Informations de livraison
                                </h3>
                                <p class="text-delivery-600 mt-1">${user.deliveryInfo}</p>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        loadProfile();
    </script>
</body>
</html>
