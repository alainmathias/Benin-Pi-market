<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter un produit - Bénin Pi Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            500: '#1a73e8',
                            600: '#1557b0',
                        },
                        secondary: {
                            500: '#ff6b00',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans">

    <header class="bg-white shadow-md sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="images/logo.png" alt="Bénin Pi Market" class="h-12">
                <span class="text-2xl font-bold text-primary-500">Bénin Pi Market</span>
            </div>
            <div class="flex items-center gap-4">
                <a href="dashboard-vendeur.html" class="btn-outline text-sm px-4 py-2">
                    <i class="fas fa-arrow-left mr-2"></i> Retour
                </a>
                <a href="#" onclick="deconnexion()" class="btn-primary text-sm px-4 py-2">Déconnexion</a>
            </div>
        </nav>
    </header>

    <div class="max-w-3xl mx-auto px-4 py-12">
        <div class="bg-white rounded-2xl shadow-card p-8 animate-fade-in">
            <h2 class="text-3xl font-bold text-dark mb-8">
                <i class="fas fa-plus-circle text-primary-500"></i> Ajouter un produit
            </h2>
            
            <div id="alert-container"></div>
            
            <form id="produitForm" class="space-y-5" enctype="multipart/form-data">
                <!-- Titre -->
                <div>
                    <label for="titre" class="label-field">Titre du produit *</label>
                    <input type="text" id="titre" class="input-field" placeholder="Ex: Table en bois massif" required>
                </div>

                <!-- Catégorie et Sous-catégorie -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="categorie" class="label-field">Catégorie *</label>
                        <select id="categorie" class="input-field" required>
                            <option value="">Sélectionnez</option>
                            <option value="Agriculture">🌾 Agriculture</option>
                            <option value="Artisanat">🪵 Artisanat</option>
                            <option value="Construction">🏗️ Construction</option>
                            <option value="Automobile">🚗 Automobile</option>
                            <option value="Électronique">📱 Électronique</option>
                            <option value="Téléphones">📱 Téléphones</option>
                            <option value="Informatique">💻 Informatique</option>
                            <option value="Mode">👗 Mode</option>
                            <option value="Chaussures">👟 Chaussures</option>
                            <option value="Beauté">💄 Beauté</option>
                            <option value="Santé">🏥 Santé</option>
                            <option value="Immobilier">🏠 Immobilier</option>
                            <option value="Services">🛠️ Services</option>
                            <option value="Restauration">🍽️ Restauration</option>
                            <option value="Éducation">📚 Éducation</option>
                            <option value="Transport">🚚 Transport</option>
                            <option value="Hôtels">🏨 Hôtels</option>
                            <option value="Tourisme">✈️ Tourisme</option>
                            <option value="Événementiel">🎉 Événementiel</option>
                        </select>
                    </div>
                    <div>
                        <label for="sousCategorie" class="label-field">Sous-catégorie</label>
                        <input type="text" id="sousCategorie" class="input-field" placeholder="Ex: Menuiserie">
                    </div>
                </div>

                <!-- Prix et Disponibilité -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="prix" class="label-field">Prix (FCFA) *</label>
                        <input type="number" id="prix" class="input-field" placeholder="75000" required>
                    </div>
                    <div>
                        <label for="disponibilite" class="label-field">Disponibilité</label>
                        <select id="disponibilite" class="input-field">
                            <option value="true">✅ Disponible</option>
                            <option value="false">❌ Indisponible</option>
                        </select>
                    </div>
                </div>

                <!-- Ville -->
                <div>
                    <label for="ville" class="label-field">Ville *</label>
                    <select id="ville" class="input-field" required>
                        <option value="">Sélectionnez une ville</option>
                        <option value="Cotonou">Cotonou</option>
                        <option value="Porto-Novo">Porto-Novo</option>
                        <option value="Parakou">Parakou</option>
                        <option value="Abomey-Calavi">Abomey-Calavi</option>
                        <option value="Bohicon">Bohicon</option>
                        <option value="Kandi">Kandi</option>
                        <option value="Natitingou">Natitingou</option>
                        <option value="Ouidah">Ouidah</option>
                        <option value="Lokossa">Lokossa</option>
                        <option value="Djougou">Djougou</option>
                        <option value="Autre">Autre</option>
                    </select>
                </div>

                <!-- Description -->
                <div>
                    <label for="description" class="label-field">Description *</label>
                    <textarea id="description" class="input-field" rows="4" 
                              placeholder="Décrivez votre produit en détail..." required></textarea>
                </div>

                <!-- Images -->
                <div>
                    <label class="label-field">Photos du produit</label>
                    <div class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center hover:border-primary-500 transition cursor-pointer" 
                         onclick="document.getElementById('images').click()">
                        <i class="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-3 block"></i>
                        <p class="text-gray-600">Cliquez pour ajouter des photos</p>
                        <p class="text-sm text-gray-400">JPG, PNG, WEBP (Max 5 Mo)</p>
                        <input type="file" id="images" class="hidden" multiple accept="image/*">
                    </div>
                    <div id="imagePreview" class="grid grid-cols-3 gap-2 mt-3"></div>
                </div>

                <button type="submit" class="btn-primary w-full py-4 text-lg">
                    <i class="fas fa-cloud-upload-alt mr-2"></i> Publier le produit
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { auth, onAuthStateChanged } from './js/firebase-config.js';
        import { publierProduit } from './js/produits.js';
        import { deconnexion } from './js/auth.js';
        import { showAlert } from './js/utils.js';

        window.deconnexion = deconnexion;

        // Vérifier l'authentification
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'connexion.html';
            }
        });

        // Prévisualisation des images
        document.getElementById('images').addEventListener('change', function(e) {
            const preview = document.getElementById('imagePreview');
            preview.innerHTML = '';
            
            for (const file of this.files) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const div = document.createElement('div');
                    div.innerHTML = `
                        <img src="${e.target.result}" class="w-full h-24 object-cover rounded-lg">
                    `;
                    preview.appendChild(div);
                };
                reader.readAsDataURL(file);
            }
        });

        // Soumission du formulaire
        document.getElementById('produitForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const titre = document.getElementById('titre').value.trim();
            const categorie = document.getElementById('categorie').value;
            const sousCategorie = document.getElementById('sousCategorie').value.trim();
            const prix = document.getElementById('prix').value;
            const description = document.getElementById('description').value.trim();
            const ville = document.getElementById('ville').value;
            const disponible = document.getElementById('disponibilite').value === 'true';
            const images = document.getElementById('images').files;

            // Validation
            if (!titre || !categorie || !prix || !description || !ville) {
                showAlert('Veuillez remplir tous les champs obligatoires.', 'danger');
                return;
            }

            if (images.length === 0) {
                showAlert('Veuillez ajouter au moins une photo.', 'danger');
                return;
            }

            if (images.length > 5) {
                showAlert('Maximum 5 photos autorisées.', 'danger');
                return;
            }

            const produitData = {
                titre,
                categorie,
                sousCategorie,
                prix: parseFloat(prix),
                description,
                ville,
                disponible,
                statut: 'publie'
            };

            const result = await publierProduit(produitData, images);

            if (result.success) {
                showAlert('Produit publié avec succès !', 'success');
                document.getElementById('produitForm').reset();
                document.getElementById('imagePreview').innerHTML = '';
            } else {
                showAlert(result.message, 'danger');
            }
        });
    </script>
</body>
</html>
