<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Bénin Pi Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            500: '#1a73e8',
                            600: '#1557b0',
                        },
                        secondary: {
                            500: '#ff6b00',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans">

    <header class="bg-white shadow-md sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="images/logo.png" alt="Bénin Pi Market" class="h-12">
                <span class="text-2xl font-bold text-primary-500">Bénin Pi Market</span>
            </div>
            <div class="flex items-center gap-4">
                <a href="connexion.html" class="btn-outline text-sm px-4 py-2">Connexion</a>
            </div>
        </nav>
    </header>

    <div class="min-h-screen flex items-center justify-center py-12 px-4">
        <div class="bg-white rounded-2xl shadow-card max-w-2xl w-full p-8 animate-fade-in">
            <h2 class="text-3xl font-bold text-center text-dark mb-8">
                <i class="fas fa-user-plus text-primary-500"></i> Créer un compte
            </h2>
            
            <div id="alert-container"></div>
            
            <form id="registerForm" class="space-y-4">
                <!-- Nom et Prénom -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="nom" class="label-field">Nom *</label>
                        <input type="text" id="nom" class="input-field" required>
                    </div>
                    <div>
                        <label for="prenom" class="label-field">Prénom *</label>
                        <input type="text" id="prenom" class="input-field" required>
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="label-field">Email (facultatif)</label>
                    <input type="email" id="email" class="input-field" placeholder="votre@email.com">
                </div>

                <!-- Mot de passe -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="password" class="label-field">Mot de passe *</label>
                        <input type="password" id="password" class="input-field" required minlength="6">
                        <p class="text-xs text-gray-500 mt-1">Minimum 6 caractères</p>
                    </div>
                    <div>
                        <label for="passwordConfirm" class="label-field">Confirmer *</label>
                        <input type="password" id="passwordConfirm" class="input-field" required>
                    </div>
                </div>

                <!-- Téléphone et WhatsApp -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="telephone" class="label-field">Téléphone *</label>
                        <input type="tel" id="telephone" class="input-field" placeholder="+229 XX XX XX XX" required>
                    </div>
                    <div>
                        <label for="whatsapp" class="label-field">WhatsApp *</label>
                        <input type="tel" id="whatsapp" class="input-field" placeholder="+229 XX XX XX XX" required>
                    </div>
                </div>

                <!-- Adresse -->
                <div>
                    <label for="adresse" class="label-field">Adresse *</label>
                    <input type="text" id="adresse" class="input-field" placeholder="Votre adresse complète" required>
                </div>

                <!-- Ville -->
                <div>
                    <label for="ville" class="label-field">Ville *</label>
                    <select id="ville" class="input-field" required>
                        <option value="">Sélectionnez votre ville</option>
                        <option value="Cotonou">Cotonou</option>
                        <option value="Porto-Novo">Porto-Novo</option>
                        <option value="Parakou">Parakou</option>
                        <option value="Abomey-Calavi">Abomey-Calavi</option>
                        <option value="Bohicon">Bohicon</option>
                        <option value="Kandi">Kandi</option>
                        <option value="Natitingou">Natitingou</option>
                        <option value="Ouidah">Ouidah</option>
                        <option value="Lokossa">Lokossa</option>
                        <option value="Djougou">Djougou</option>
                        <option value="Autre">Autre</option>
                    </select>
                </div>

                <!-- Profession et Catégorie -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="profession" class="label-field">Profession *</label>
                        <input type="text" id="profession" class="input-field" placeholder="Menuisier, Commerçant..." required>
                    </div>
                    <div>
                        <label for="categorieActivite" class="label-field">Catégorie d'activité *</label>
                        <select id="categorieActivite" class="input-field" required>
                            <option value="">Sélectionnez</option>
                            <option value="Agriculture">🌾 Agriculture</option>
                            <option value="Artisanat">🪵 Artisanat</option>
                            <option value="Construction">🏗️ Construction</option>
                            <option value="Automobile">🚗 Automobile</option>
                            <option value="Électronique">📱 Électronique</option>
                            <option value="Mode">👗 Mode</option>
                            <option value="Immobilier">🏠 Immobilier</option>
                            <option value="Services">🛠️ Services</option>
                            <option value="Restauration">🍽️ Restauration</option>
                            <option value="Transport">🚚 Transport</option>
                            <option value="Hôtels">🏨 Hôtels</option>
                            <option value="Tourisme">✈️ Tourisme</option>
                            <option value="Événementiel">🎉 Événementiel</option>
                            <option value="Santé">🏥 Santé</option>
                            <option value="Éducation">📚 Éducation</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn-primary w-full py-4 text-lg">
                    <i class="fas fa-user-plus mr-2"></i> S'inscrire
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-600">Déjà un compte ? 
                    <a href="connexion.html" class="text-primary-500 font-semibold hover:underline">Se connecter</a>
                </p>
                <p class="text-xs text-gray-400 mt-2">
                    En vous inscrivant, vous acceptez nos 
                    <a href="conditions.html" class="text-primary-500 hover:underline">conditions d'utilisation</a>
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        import { inscription } from './js/auth.js';
        import { showAlert } from './js/utils.js';

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                nom: document.getElementById('nom').value.trim(),
                prenom: document.getElementById('prenom').value.trim(),
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value,
                passwordConfirm: document.getElementById('passwordConfirm').value,
                telephone: document.getElementById('telephone').value.trim(),
                whatsapp: document.getElementById('whatsapp').value.trim(),
                adresse: document.getElementById('adresse').value.trim(),
                ville: document.getElementById('ville').value,
                profession: document.getElementById('profession').value.trim(),
                categorieActivite: document.getElementById('categorieActivite').value
            };

            // Validation
            if (formData.password !== formData.passwordConfirm) {
                showAlert('Les mots de passe ne correspondent pas.', 'danger');
                return;
            }

            if (formData.password.length < 6) {
                showAlert('Le mot de passe doit contenir au moins 6 caractères.', 'danger');
                return;
            }

            const requiredFields = ['nom', 'prenom', 'telephone', 'whatsapp', 'adresse', 'ville', 'profession', 'categorieActivite'];
            for (const field of requiredFields) {
                if (!formData[field]) {
                    showAlert(`Veuillez remplir le champ "${field}"`, 'danger');
                    return;
                }
            }

            const userData = {
                nom: formData.nom,
                prenom: formData.prenom,
                telephone: formData.telephone,
                whatsapp: formData.whatsapp,
                adresse: formData.adresse,
                ville: formData.ville,
                profession: formData.profession,
                categorieActivite: formData.categorieActivite
            };

            const email = formData.email || `${formData.telephone}@beninpimarket.com`;
            const result = await inscription(email, formData.password, userData);

            if (result.success) {
                showAlert(result.message, 'success');
                setTimeout(() => {
                    window.location.href = 'connexion.html';
                }, 3000);
            } else {
                showAlert(result.message, 'danger');
            }
        });
    </script>
</body>
</html>
