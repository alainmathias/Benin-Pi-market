<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter un produit - Bénin Pi Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 500: '#1a73e8', 600: '#1557b0' },
                        secondary: { 500: '#ff6b00' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">

    <!-- ========== HEADER ========== -->
    <header class="bg-white shadow-md sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="../index.html" class="flex items-center gap-3">
                <img src="../images/logo.png" alt="Bénin Pi Market" class="h-12" onerror="this.style.display='none'">
                <span class="text-2xl font-bold text-primary-500">Bénin Pi Market</span>
            </a>
            <div class="flex items-center gap-4">
                <a href="my-products.html" class="text-gray-600 hover:text-primary-500 transition">
                    <i class="fas fa-arrow-left mr-2"></i> Retour
                </a>
                <a href="#" onclick="logout()" class="text-red-500 hover:text-red-600 transition">
                    <i class="fas fa-sign-out-alt mr-1"></i> Déconnexion
                </a>
            </div>
        </nav>
    </header>

    <!-- ========== CONTENU PRINCIPAL ========== -->
    <div class="flex-1 max-w-3xl mx-auto px-4 py-8 w-full">
        <div class="bg-white rounded-2xl shadow-card p-6 md:p-8">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-12 h-12 bg-primary-100 rounded-xl flex items-center justify-center">
                    <i class="fas fa-plus-circle text-2xl text-primary-500"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-dark">Ajouter un produit</h1>
                    <p class="text-gray-500 text-sm">Publiez votre produit en quelques étapes</p>
                </div>
            </div>

            <div id="alert-container"></div>

            <form id="productForm" class="space-y-5" enctype="multipart/form-data">

                <!-- Titre -->
                <div>
                    <label for="title" class="block text-sm font-semibold text-gray-700 mb-2">
                        Titre du produit <span class="text-red-500">*</span>
                    </label>
                    <input type="text" id="title" 
                           class="input-field w-full" 
                           placeholder="Ex: Table en bois massif"
                           required>
                </div>

                <!-- Catégorie et Sous-catégorie -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="category" class="block text-sm font-semibold text-gray-700 mb-2">
                            Catégorie <span class="text-red-500">*</span>
                        </label>
                        <select id="category" class="input-field w-full" required>
                            <option value="">Sélectionnez</option>
                            <option value="Agriculture">🌾 Agriculture</option>
                            <option value="Artisanat">🪵 Artisanat</option>
                            <option value="Construction">🏗️ Construction</option>
                            <option value="Automobile">🚗 Automobile</option>
                            <option value="Électronique">📱 Électronique</option>
                            <option value="Téléphones">📱 Téléphones</option>
                            <option value="Informatique">💻 Informatique</option>
                            <option value="Mode">👗 Mode</option>
                            <option value="Chaussures">👟 Chaussures</option>
                            <option value="Beauté">💄 Beauté</option>
                            <option value="Santé">🏥 Santé</option>
                            <option value="Immobilier">🏠 Immobilier</option>
                            <option value="Services">🛠️ Services</option>
                            <option value="Restauration">🍽️ Restauration</option>
                            <option value="Éducation">📚 Éducation</option>
                            <option value="Transport">🚚 Transport</option>
                            <option value="Hôtels">🏨 Hôtels</option>
                            <option value="Tourisme">✈️ Tourisme</option>
                            <option value="Événementiel">🎉 Événementiel</option>
                        </select>
                    </div>
                    <div>
                        <label for="subCategory" class="block text-sm font-semibold text-gray-700 mb-2">
                            Sous-catégorie
                        </label>
                        <input type="text" id="subCategory" 
                               class="input-field w-full" 
                               placeholder="Ex: Menuiserie">
                    </div>
                </div>

                <!-- Prix et Ville -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="price" class="block text-sm font-semibold text-gray-700 mb-2">
                            Prix (FCFA) <span class="text-red-500">*</span>
                        </label>
                        <input type="number" id="price" 
                               class="input-field w-full" 
                               placeholder="75000"
                               required>
                    </div>
                    <div>
                        <label for="city" class="block text-sm font-semibold text-gray-700 mb-2">
                            Ville <span class="text-red-500">*</span>
                        </label>
                        <select id="city" class="input-field w-full" required>
                            <option value="">Sélectionnez</option>
                            <option value="Cotonou">Cotonou</option>
                            <option value="Porto-Novo">Porto-Novo</option>
                            <option value="Parakou">Parakou</option>
                            <option value="Abomey-Calavi">Abomey-Calavi</option>
                            <option value="Bohicon">Bohicon</option>
                            <option value="Kandi">Kandi</option>
                            <option value="Natitingou">Natitingou</option>
                            <option value="Ouidah">Ouidah</option>
                            <option value="Lokossa">Lokossa</option>
                            <option value="Djougou">Djougou</option>
                            <option value="Autre">Autre</option>
                        </select>
                    </div>
                </div>

                <!-- Description -->
                <div>
                    <label for="description" class="block text-sm font-semibold text-gray-700 mb-2">
                        Description <span class="text-red-500">*</span>
                    </label>
                    <textarea id="description" rows="5" 
                              class="input-field w-full resize-none" 
                              placeholder="Décrivez votre produit en détail (matériaux, dimensions, état, etc.)"
                              required></textarea>
                    <p class="text-xs text-gray-400 mt-1">
                        <span id="charCount">0</span> caractères
                    </p>
                </div>

                <!-- Images -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Photos <span class="text-red-500">*</span>
                    </label>
                    <div class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center hover:border-primary-500 transition cursor-pointer"
                         onclick="document.getElementById('images').click()"
                         ondrop="handleDrop(event)"
                         ondragover="event.preventDefault()">
                        <i class="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-3 block"></i>
                        <p class="text-gray-600">Cliquez ou glissez-déposez vos photos</p>
                        <p class="text-sm text-gray-400 mt-1">JPG, PNG, WEBP (Max 5 Mo)</p>
                        <p class="text-xs text-gray-400">Jusqu'à 5 photos</p>
                        <input type="file" id="images" class="hidden" multiple accept="image/*" required>
                    </div>
                    <div id="imagePreview" class="grid grid-cols-3 md:grid-cols-5 gap-3 mt-4"></div>
                </div>

                <!-- Bouton de soumission -->
                <button type="submit" id="submitBtn" 
                        class="w-full bg-primary-500 text-white py-4 rounded-xl font-semibold hover:bg-primary-600 transform hover:-translate-y-1 transition shadow-md hover:shadow-lg text-lg flex items-center justify-center gap-2">
                    <i class="fas fa-cloud-upload-alt"></i>
                    Publier le produit
                </button>
            </form>
        </div>
    </div>

    <!-- ========== FOOTER ========== -->
    <footer class="bg-dark text-white py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-sm text-gray-400">&copy; 2026 Bénin Pi Market</p>
        </div>
    </footer>

    <!-- ========== JAVASCRIPT ========== -->
    <script type="module">
        import { auth, db, storage, ref, uploadBytes, getDownloadURL, onAuthStateChanged, doc, getDoc, addDoc, collection, serverTimestamp } from '../js/firebase-config.js';
        import { showAlert, logout } from '../js/utils.js';

        // Exposer logout globalement
        window.logout = logout;

        let currentUser = null;
        let userData = null;

        // ============================================
        // VÉRIFICATION DE L'AUTHENTIFICATION
        // ============================================
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = '../auth/login.html';
                return;
            }

            currentUser = user;

            try {
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (!userDoc.exists()) {
                    window.location.href = '../auth/login.html';
                    return;
                }

                userData = userDoc.data();

                // Vérifier si le compte est validé
                if (userData.status !== 'active') {
                    showAlert(
                        userData.status === 'pending' 
                            ? 'Votre compte est en attente de validation. Vous ne pouvez pas encore publier de produits.' 
                            : 'Votre compte est suspendu. Contactez l\'administrateur.',
                        'danger'
                    );
                    document.getElementById('submitBtn').disabled = true;
                    document.getElementById('submitBtn').classList.add('opacity-50', 'cursor-not-allowed');
                }

            } catch (error) {
                console.error('Erreur récupération utilisateur:', error);
                showAlert('Erreur de chargement du profil.', 'danger');
            }
        });

        // ============================================
        // COMPTEUR DE CARACTÈRES
        // ============================================
        const description = document.getElementById('description');
        const charCount = document.getElementById('charCount');

        description.addEventListener('input', () => {
            charCount.textContent = description.value.length;
        });

        // ============================================
        // PRÉVISUALISATION DES IMAGES
        // ============================================
        const imagesInput = document.getElementById('images');
        const imagePreview = document.getElementById('imagePreview');
        const maxImages = 5;

        imagesInput.addEventListener('change', function(e) {
            const files = Array.from(this.files);
            
            if (files.length > maxImages) {
                showAlert(`Vous ne pouvez ajouter que ${maxImages} photos maximum.`, 'danger');
                this.value = '';
                imagePreview.innerHTML = '';
                return;
            }

            imagePreview.innerHTML = '';
            
            files.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const div = document.createElement('div');
                    div.className = 'relative group';
                    div.innerHTML = `
                        <img src="${e.target.result}" class="w-full h-24 object-cover rounded-lg border-2 border-gray-200 group-hover:border-primary-500 transition">
                        <button type="button" onclick="removeImage(${index})" 
                                class="absolute -top-2 -right-2 bg-red-500 text-white w-6 h-6 rounded-full flex items-center justify-center text-sm hover:bg-red-600 transition opacity-0 group-hover:opacity-100">
                            <i class="fas fa-times"></i>
                        </button>
                    `;
                    imagePreview.appendChild(div);
                };
                reader.readAsDataURL(file);
            });

            // Stocker les fichiers pour les supprimer
            window._imageFiles = files;
        });

        // Supprimer une image de la prévisualisation
        window.removeImage = function(index) {
            const files = Array.from(imagesInput.files);
            files.splice(index, 1);
            
            // Créer un nouveau FileList
            const dataTransfer = new DataTransfer();
            files.forEach(file => dataTransfer.items.add(file));
            imagesInput.files = dataTransfer.files;
            
            // Re-générer la prévisualisation
            imagesInput.dispatchEvent(new Event('change'));
        };

        // ============================================
        // GESTION DU DRAG & DROP
        // ============================================
        window.handleDrop = function(e) {
            e.preventDefault();
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                imagesInput.files = files;
                imagesInput.dispatchEvent(new Event('change'));
            }
        };

        // ============================================
        // SOUMISSION DU FORMULAIRE
        // ============================================
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Vérifier si l'utilisateur est validé
            if (!userData || userData.status !== 'active') {
                showAlert('Votre compte doit être validé pour publier des produits.', 'danger');
                return;
            }

            const title = document.getElementById('title').value.trim();
            const category = document.getElementById('category').value;
            const subCategory = document.getElementById('subCategory').value.trim();
            const price = document.getElementById('price').value;
            const city = document.getElementById('city').value;
            const description = document.getElementById('description').value.trim();
            const images = document.getElementById('images').files;

            // Validations
            if (!title || !category || !price || !city || !description) {
                showAlert('Veuillez remplir tous les champs obligatoires.', 'danger');
                return;
            }

            if (images.length === 0) {
                showAlert('Veuillez ajouter au moins une photo.', 'danger');
                return;
            }

            if (price <= 0) {
                showAlert('Le prix doit être supérieur à 0.', 'danger');
                return;
            }

            // Désactiver le bouton
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Publication en cours...';
            submitBtn.disabled = true;

            try {
                // 1. Upload des images
                const imageUrls = await uploadImages(images, currentUser.uid);

                // 2. Créer le produit dans Firestore
                const productData = {
                    title,
                    category,
                    subCategory,
                    price: parseFloat(price),
                    city,
                    description,
                    images: imageUrls,
                    sellerId: currentUser.uid,
                    sellerName: `${userData.prenom} ${userData.nom}`,
                    sellerWhatsapp: userData.whatsapp || userData.telephone,
                    status: 'pending', // en attente de validation admin
                    views: 0,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };

                const docRef = await addDoc(collection(db, 'products'), productData);

                // 3. Incrémenter le compteur de produits du vendeur
                await updateDoc(doc(db, 'users', currentUser.uid), {
                    productsCount: (userData.productsCount || 0) + 1
                });

                showAlert('✅ Produit publié avec succès ! En attente de validation.', 'success');
                
                // Réinitialiser le formulaire
                document.getElementById('productForm').reset();
                imagePreview.innerHTML = '';
                charCount.textContent = '0';

                // Rediriger après 3 secondes
                setTimeout(() => {
                    window.location.href = 'my-products.html';
                }, 3000);

            } catch (error) {
                console.error('Erreur publication:', error);
                showAlert('❌ Erreur lors de la publication : ' + error.message, 'danger');
            }

            // Réactiver le bouton
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        });

        // ============================================
        // UPLOAD DES IMAGES
        // ============================================
        async function uploadImages(images, userId) {
            const urls = [];
            const maxSize = 5 * 1024 * 1024; // 5 Mo

            for (let i = 0; i < images.length; i++) {
                const file = images[i];

                // Vérifier la taille
                if (file.size > maxSize) {
                    showAlert(`L'image "${file.name}" dépasse 5 Mo.`, 'danger');
                    continue;
                }

                try {
                    // Compresser l'image avant upload
                    const compressedFile = await compressImage(file);

                    const filename = `${userId}/${Date.now()}_${i}.webp`;
                    const storageRef = ref(storage, `products/${filename}`);
                    
                    await uploadBytes(storageRef, compressedFile);
                    const url = await getDownloadURL(storageRef);
                    urls.push(url);
                } catch (error) {
                    console.error(`Erreur upload image ${i}:`, error);
                    showAlert(`Erreur lors de l'upload de "${file.name}"`, 'danger');
                }
            }

            if (urls.length === 0) {
                throw new Error('Aucune image n\'a pu être téléchargée.');
            }

            return urls;
        }

        // ============================================
        // COMPRESSION D'IMAGE (via Canvas)
        // ============================================
        function compressImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const maxDimension = 1200;

                        if (width > maxDimension || height > maxDimension) {
                            const ratio = Math.min(maxDimension / width, maxDimension / height);
                            width = Math.round(width * ratio);
                            height = Math.round(height * ratio);
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        canvas.toBlob((blob) => {
                            const compressedFile = new File([blob], file.name.replace(/\.[^/.]+$/, '.webp'), {
                                type: 'image/webp',
                                lastModified: Date.now()
                            });
                            resolve(compressedFile);
                        }, 'image/webp', 0.8);
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        }

        // ============================================
        // IMPORT DE updateDoc
        // ============================================
        import { updateDoc } from '../js/firebase-config.js';
    </script>
</body>
</html>
