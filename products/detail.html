<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détail produit - Bénin Pi Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 500: '#1a73e8', 600: '#1557b0' },
                        secondary: { 500: '#ff6b00' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">

    <!-- ========== HEADER ========== -->
    <header class="bg-white shadow-md sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="../index.html" class="flex items-center gap-3">
                <img src="../images/logo.png" alt="Bénin Pi Market" class="h-12" onerror="this.style.display='none'">
                <span class="text-2xl font-bold text-primary-500">Bénin Pi Market</span>
            </a>
            <div class="flex items-center gap-4">
                <a href="list.html" class="text-gray-600 hover:text-primary-500 transition">
                    <i class="fas fa-arrow-left mr-2"></i> Retour
                </a>
                <a href="../auth/login.html" class="border-2 border-primary-500 text-primary-500 px-4 py-2 rounded-xl font-semibold hover:bg-primary-500 hover:text-white transition">
                    Connexion
                </a>
            </div>
        </nav>
    </header>

    <!-- ========== CONTENU PRINCIPAL ========== -->
    <div class="flex-1 max-w-6xl mx-auto px-4 py-8 w-full">
        <div id="productContainer" class="bg-white rounded-2xl shadow-card overflow-hidden">
            <!-- Loading -->
            <div class="text-center py-16">
                <div class="spinner mx-auto"></div>
                <p class="mt-4 text-gray-500">Chargement du produit...</p>
            </div>
        </div>
    </div>

    <!-- ========== FOOTER ========== -->
    <footer class="bg-dark text-white py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-sm text-gray-400">&copy; 2026 Bénin Pi Market</p>
        </div>
    </footer>

    <!-- ========== JAVASCRIPT ========== -->
    <script type="module">
        import { auth, db, doc, getDoc, updateDoc, onAuthStateChanged } from '../js/firebase-config.js';
        import { formatPrice, formatDate, showAlert } from '../js/utils.js';

        // Récupérer l'ID depuis l'URL
        const params = new URLSearchParams(window.location.search);
        const productId = params.get('id');

        // Si pas d'ID, afficher une erreur
        if (!productId) {
            document.getElementById('productContainer').innerHTML = `
                <div class="text-center py-16">
                    <i class="fas fa-exclamation-circle text-6xl text-red-400 block mb-4"></i>
                    <h2 class="text-2xl font-bold text-dark">Produit non trouvé</h2>
                    <p class="text-gray-500 mt-2">Aucun ID de produit spécifié.</p>
                    <a href="list.html" class="btn-primary mt-6 inline-block">
                        <i class="fas fa-arrow-left mr-2"></i> Voir les produits
                    </a>
                </div>
            `;
        }

        // Vérifier l'authentification
        let currentUser = null;
        let userData = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                try {
                    const userDoc = await getDoc(doc(db, 'users', user.uid));
                    if (userDoc.exists()) {
                        userData = userDoc.data();
                    }
                } catch (e) {
                    console.error('Erreur récupération utilisateur:', e);
                }
            }
            // Charger le produit (même si non connecté)
            chargerProduit();
        });

        async function chargerProduit() {
            try {
                const docRef = doc(db, 'products', productId);
                const docSnap = await getDoc(docRef);

                if (!docSnap.exists()) {
                    document.getElementById('productContainer').innerHTML = `
                        <div class="text-center py-16">
                            <i class="fas fa-box-open text-6xl text-gray-300 block mb-4"></i>
                            <h2 class="text-2xl font-bold text-dark">Produit introuvable</h2>
                            <p class="text-gray-500 mt-2">Ce produit n'existe pas ou a été supprimé.</p>
                            <a href="list.html" class="btn-primary mt-6 inline-block">
                                <i class="fas fa-arrow-left mr-2"></i> Voir les produits
                            </a>

<!-- Bouton Payer en Crypto Pi -->
<div class="mt-4">
    <a href="payment.html?id=${product.id}" 
       class="w-full bg-pi-500 hover:bg-pi-600 text-white py-4 rounded-xl font-semibold transition flex items-center justify-center gap-2 text-lg">
        <i class="fas fa-coin text-xl"></i>
        Acheter en Crypto Pi
    </a>
    <p class="text-xs text-center text-gray-400 mt-2">
        💰 Paiement sécurisé en Crypto Pi via WhatsApp
    </p>
</div>

                        </div>
                    `;
                    return;
                }

                const product = docSnap.data();

                // Vérifier si le produit est publié
                if (product.status !== 'published') {
                    document.getElementById('productContainer').innerHTML = `
                        <div class="text-center py-16">
                            <i class="fas fa-lock text-6xl text-yellow-400 block mb-4"></i>
                            <h2 class="text-2xl font-bold text-dark">Produit non disponible</h2>
                            <p class="text-gray-500 mt-2">Ce produit est en attente de validation ou a été retiré.</p>
                            <a href="list.html" class="btn-primary mt-6 inline-block">
                                <i class="fas fa-arrow-left mr-2"></i> Voir les produits
                            </a>
                        </div>
                    `;
                    return;
                }

                // Vérifier si l'utilisateur peut voir le bouton WhatsApp
                const canContact = currentUser && userData && userData.status === 'active';

                // Incrémenter les vues
                await updateDoc(docRef, {
                    views: (product.views || 0) + 1
                });

                // Afficher le produit
                document.getElementById('productContainer').innerHTML = `
                    <div class="grid md:grid-cols-2 gap-8 p-6 md:p-8">
                        <!-- Images -->
                        <div>
                            <div class="bg-gray-100 rounded-xl h-80 md:h-96 flex items-center justify-center overflow-hidden">
                                ${product.images && product.images.length > 0 
                                    ? `<img src="${product.images[0]}" alt="${product.title}" class="w-full h-full object-cover" id="mainImage">`
                                    : `<i class="fas fa-image text-6xl text-gray-300"></i>`
                                }
                            </div>
                            ${product.images && product.images.length > 1 ? `
                                <div class="grid grid-cols-4 gap-2 mt-4">
                                    ${product.images.map((img, index) => `
                                        <div class="bg-gray-100 rounded-lg h-20 overflow-hidden cursor-pointer hover:opacity-75 transition border-2 ${index === 0 ? 'border-primary-500' : 'border-transparent'}"
                                             onclick="document.getElementById('mainImage').src='${img}'; document.querySelectorAll('.thumbnail').forEach(el => el.classList.remove('border-primary-500')); this.classList.add('border-primary-500')">
                                            <img src="${img}" class="w-full h-full object-cover thumbnail">
                                        </div>
                                    `).join('')}
                                </div>
                            ` : ''}
                        </div>

                        <!-- Informations -->
                        <div>
                            <!-- Catégorie -->
                            <div class="flex items-center gap-2 mb-2">
                                <span class="bg-primary-100 text-primary-700 text-sm px-3 py-1 rounded-full">
                                    ${product.category || 'Non catégorisé'}
                                </span>
                                ${product.subCategory ? `
                                    <span class="bg-gray-100 text-gray-600 text-sm px-3 py-1 rounded-full">
                                        ${product.subCategory}
                                    </span>
                                ` : ''}
                            </div>

                            <!-- Titre -->
                            <h1 class="text-3xl font-bold text-dark">${product.title}</h1>

                            <!-- Prix -->
                            <div class="text-3xl font-bold text-secondary-500 mt-2">
                                ${formatPrice(product.price)}
                            </div>

                            <!-- Localisation et date -->
                            <div class="flex flex-wrap items-center gap-4 mt-4 text-gray-600">
                                <span><i class="fas fa-map-marker-alt text-primary-500 mr-1"></i> ${product.city || 'Non spécifié'}</span>
                                <span><i class="far fa-calendar mr-1"></i> Publié le ${formatDate(product.createdAt)}</span>
                                <span><i class="far fa-eye mr-1"></i> ${product.views || 0} vues</span>
                            </div>

                            <!-- Disponibilité -->
                            <div class="mt-4">
                                <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm font-medium">
                                    <i class="fas fa-check-circle mr-1"></i> Disponible
                                </span>
                            </div>

                            <!-- Description -->
                            <div class="mt-6">
                                <h3 class="font-semibold text-lg text-dark mb-2">Description</h3>
                                <p class="text-gray-600 whitespace-pre-line">${product.description || 'Aucune description'}</p>
                            </div>

                            <!-- Vendeur -->
                            <div class="mt-6 p-4 bg-gray-50 rounded-xl">
                                <h4 class="font-semibold text-dark mb-2">
                                    <i class="fas fa-store text-primary-500 mr-2"></i> Vendeur
                                </h4>
                                <p class="font-medium">${product.sellerName || 'Vendeur inconnu'}</p>
                                <p class="text-sm text-gray-500">${product.city || ''}</p>
                            </div>

                            <!-- Bouton WhatsApp -->
                            ${canContact && product.sellerWhatsapp ? `
                                <a href="https://wa.me/${product.sellerWhatsapp.replace(/\s/g, '').replace(/^\+/, '')}?text=${encodeURIComponent(
                                    `Bonjour, je vous contacte depuis Bénin Pi Market. Je suis intéressé par votre produit : "${product.title}". Pouvez-vous me donner plus d'informations ? Merci.`
                                )}" 
                                   target="_blank"
                                   class="btn-secondary w-full mt-6 justify-center text-lg py-4">
                                    <i class="fab fa-whatsapp mr-2 text-xl"></i> Contacter sur WhatsApp
                                </a>
                            ` : !currentUser ? `
                                <div class="mt-6 p-4 bg-yellow-50 border border-yellow-200 rounded-xl">
                                    <p class="text-yellow-700 text-center">
                                        <i class="fas fa-info-circle mr-2"></i>
                                        <a href="../auth/login.html" class="font-semibold underline hover:no-underline">Connectez-vous</a> 
                                        pour contacter le vendeur
                                    </p>
                                </div>
                            ` : userData && userData.status === 'pending' ? `
                                <div class="mt-6 p-4 bg-yellow-50 border border-yellow-200 rounded-xl">
                                    <p class="text-yellow-700 text-center">
                                        <i class="fas fa-clock mr-2"></i>
                                        Votre compte est en attente de validation. Revenez plus tard pour contacter les vendeurs.
                                    </p>
                                </div>
                            ` : null}
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error('Erreur chargement produit:', error);
                document.getElementById('productContainer').innerHTML = `
                    <div class="text-center py-16">
                        <i class="fas fa-exclamation-circle text-6xl text-red-400 block mb-4"></i>
                        <h2 class="text-2xl font-bold text-dark">Erreur de chargement</h2>
                        <p class="text-gray-500 mt-2">${error.message || 'Une erreur est survenue.'}</p>
                        <a href="list.html" class="btn-primary mt-6 inline-block">
                            <i class="fas fa-arrow-left mr-2"></i> Voir les produits
                        </a>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
