<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes produits - Bénin Pi Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 500: '#1a73e8', 600: '#1557b0' },
                        secondary: { 500: '#ff6b00' },
                        success: { 500: '#22c55e' },
                        warning: { 500: '#f59e0b' },
                        danger: { 500: '#ef4444' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">

    <!-- ========== HEADER ========== -->
    <header class="bg-white shadow-md sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="../index.html" class="flex items-center gap-3">
                <img src="../images/logo.png" alt="Bénin Pi Market" class="h-12" onerror="this.style.display='none'">
                <span class="text-2xl font-bold text-primary-500">Bénin Pi Market</span>
            </a>
            <div class="flex items-center gap-4">
                <a href="../dashboard/vendor.html" class="text-gray-600 hover:text-primary-500 transition">
                    <i class="fas fa-arrow-left mr-2"></i> Dashboard
                </a>
                <a href="add.html" class="bg-primary-500 text-white px-4 py-2 rounded-xl font-semibold hover:bg-primary-600 transition">
                    <i class="fas fa-plus mr-2"></i> Ajouter
                </a>
                <a href="#" onclick="logout()" class="text-red-500 hover:text-red-600 transition">
                    <i class="fas fa-sign-out-alt"></i>
                </a>
            </div>
        </nav>
    </header>

    <!-- ========== CONTENU PRINCIPAL ========== -->
    <div class="flex-1 max-w-7xl mx-auto px-4 py-8 w-full">
        <!-- En-tête -->
        <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-8">
            <div>
                <h1 class="text-3xl font-bold text-dark">
                    <i class="fas fa-box text-primary-500"></i> Mes produits
                </h1>
                <p class="text-gray-500 mt-1">Gérez tous vos produits publiés</p>
            </div>
            <div class="flex gap-3 mt-4 md:mt-0">
                <a href="add.html" class="btn-primary">
                    <i class="fas fa-plus mr-2"></i> Nouveau produit
                </a>
            </div>
        </div>

        <!-- Alertes -->
        <div id="alert-container"></div>

        <!-- Statistiques -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white rounded-xl shadow-card p-4 text-center">
                <div class="text-2xl font-bold text-primary-500" id="totalCount">0</div>
                <div class="text-sm text-gray-500">Total</div>
            </div>
            <div class="bg-white rounded-xl shadow-card p-4 text-center">
                <div class="text-2xl font-bold text-success-500" id="publishedCount">0</div>
                <div class="text-sm text-gray-500">Publiés</div>
            </div>
            <div class="bg-white rounded-xl shadow-card p-4 text-center">
                <div class="text-2xl font-bold text-warning-500" id="pendingCount">0</div>
                <div class="text-sm text-gray-500">En attente</div>
            </div>
            <div class="bg-white rounded-xl shadow-card p-4 text-center">
                <div class="text-2xl font-bold text-gray-500" id="viewsCount">0</div>
                <div class="text-sm text-gray-500">Vues totales</div>
            </div>
        </div>

        <!-- Filtres -->
        <div class="bg-white rounded-xl shadow-card p-4 mb-6">
            <div class="flex flex-wrap gap-3">
                <button onclick="filterProducts('all')" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium bg-primary-500 text-white" data-filter="all">
                    Tous
                </button>
                <button onclick="filterProducts('published')" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-700 hover:bg-gray-200" data-filter="published">
                    <i class="fas fa-check-circle text-success-500 mr-1"></i> Publiés
                </button>
                <button onclick="filterProducts('pending')" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-700 hover:bg-gray-200" data-filter="pending">
                    <i class="fas fa-clock text-warning-500 mr-1"></i> En attente
                </button>
                <button onclick="filterProducts('rejected')" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-700 hover:bg-gray-200" data-filter="rejected">
                    <i class="fas fa-times-circle text-danger-500 mr-1"></i> Refusés
                </button>
                <div class="flex-1"></div>
                <div class="relative">
                    <input type="text" id="searchProduct" placeholder="Rechercher..." 
                           class="px-4 py-2 border-2 border-gray-200 rounded-lg focus:border-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-200 transition w-full md:w-48"
                           oninput="searchProducts(this.value)">
                    <i class="fas fa-search absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                </div>
            </div>
        </div>

        <!-- Liste des produits -->
        <div id="productsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-12">
                <div class="spinner mx-auto"></div>
                <p class="mt-4 text-gray-500">Chargement de vos produits...</p>
            </div>
        </div>

        <!-- Pagination -->
        <div id="pagination" class="flex justify-center mt-8 space-x-2">
        </div>
    </div>

    <!-- ========== FOOTER ========== -->
    <footer class="bg-dark text-white py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-sm text-gray-400">&copy; 2026 Bénin Pi Market</p>
        </div>
    </footer>

    <!-- ========== JAVASCRIPT ========== -->
    <script type="module">
        import { auth, db, collection, query, where, orderBy, getDocs, doc, deleteDoc, updateDoc, onAuthStateChanged } from '../js/firebase-config.js';
        import { showAlert, formatPrice, formatDate, logout } from '../js/utils.js';

        window.logout = logout;

        let currentUser = null;
        let userData = null;
        let allProducts = [];
        let currentFilter = 'all';
        let searchTerm = '';

        // ============================================
        // VÉRIFICATION DE L'AUTHENTIFICATION
        // ============================================
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = '../auth/login.html';
                return;
            }

            currentUser = user;

            try {
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (!userDoc.exists()) {
                    window.location.href = '../auth/login.html';
                    return;
                }

                userData = userDoc.data();
                
                if (userData.role === 'admin') {
                    window.location.href = '../dashboard/admin.html';
                    return;
                }

                await loadProducts();

            } catch (error) {
                console.error('Erreur:', error);
                showAlert('Erreur de chargement des données.', 'danger');
            }
        });

        // ============================================
        // CHARGER LES PRODUITS
        // ============================================
        async function loadProducts() {
            try {
                const q = query(
                    collection(db, 'products'),
                    where('sellerId', '==', currentUser.uid),
                    orderBy('createdAt', 'desc')
                );
                
                const querySnapshot = await getDocs(q);
                allProducts = [];
                querySnapshot.forEach((doc) => {
                    allProducts.push({ id: doc.id, ...doc.data() });
                });

                updateStats();
                renderProducts();

            } catch (error) {
                console.error('Erreur chargement produits:', error);
                showAlert('Erreur lors du chargement des produits.', 'danger');
                document.getElementById('productsContainer').innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <i class="fas fa-exclamation-circle text-6xl text-red-400 block mb-4"></i>
                        <p class="text-gray-500">Erreur de chargement</p>
                    </div>
                `;
            }
        }

        // ============================================
        // STATISTIQUES
        // ============================================
        function updateStats() {
            const total = allProducts.length;
            const published = allProducts.filter(p => p.status === 'published').length;
            const pending = allProducts.filter(p => p.status === 'pending').length;
            const views = allProducts.reduce((sum, p) => sum + (p.views || 0), 0);

            document.getElementById('totalCount').textContent = total;
            document.getElementById('publishedCount').textContent = published;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('viewsCount').textContent = views;
        }

        // ============================================
        // AFFICHER LES PRODUITS
        // ============================================
        function renderProducts() {
            const container = document.getElementById('productsContainer');
            
            // Filtrer
            let filtered = allProducts;
            
            if (currentFilter !== 'all') {
                filtered = filtered.filter(p => p.status === currentFilter);
            }
            
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filtered = filtered.filter(p => 
                    p.title.toLowerCase().includes(term) ||
                    p.category.toLowerCase().includes(term) ||
                    p.city.toLowerCase().includes(term)
                );
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-16">
                        <i class="fas fa-box-open text-6xl text-gray-300 block mb-4"></i>
                        <h3 class="text-xl font-semibold text-dark">Aucun produit trouvé</h3>
                        <p class="text-gray-500 mt-2">
                            ${allProducts.length === 0 ? 'Vous n\'avez pas encore publié de produits.' : 'Aucun produit ne correspond à vos filtres.'}
                        </p>
                        ${allProducts.length === 0 ? `
                            <a href="add.html" class="btn-primary mt-6 inline-block">
                                <i class="fas fa-plus mr-2"></i> Publier votre premier produit
                            </a>
                        ` : ''}
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(product => `
                <div class="bg-white rounded-2xl shadow-card hover:shadow-card-hover overflow-hidden transition-all duration-300 group">
                    <div class="relative h-48 bg-gray-100 overflow-hidden">
                        ${product.images && product.images.length > 0 
                            ? `<img src="${product.images[0]}" alt="${product.title}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">`
                            : `<div class="w-full h-full flex items-center justify-center"><i class="fas fa-image text-6xl text-gray-300"></i></div>`
                        }
                        <div class="absolute top-2 right-2 flex gap-2">
                            <a href="edit.html?id=${product.id}" class="bg-white p-2 rounded-full shadow-md hover:bg-primary-500 hover:text-white transition" title="Modifier">
                                <i class="fas fa-edit text-sm"></i>
                            </a>
                            <button onclick="deleteProduct('${product.id}')" class="bg-white p-2 rounded-full shadow-md hover:bg-red-500 hover:text-white transition" title="Supprimer">
                                <i class="fas fa-trash text-sm"></i>
                            </button>
                        </div>
                        <div class="absolute top-2 left-2">
                            ${product.status === 'published' ? `
                                <span class="bg-success-500 text-white text-xs px-3 py-1 rounded-full">
                                    <i class="fas fa-check-circle mr-1"></i> Publié
                                </span>
                            ` : product.status === 'pending' ? `
                                <span class="bg-warning-500 text-white text-xs px-3 py-1 rounded-full">
                                    <i class="fas fa-clock mr-1"></i> En attente
                                </span>
                            ` : `
                                <span class="bg-danger-500 text-white text-xs px-3 py-1 rounded-full">
                                    <i class="fas fa-times-circle mr-1"></i> Refusé
                                </span>
                            `}
                        </div>
                    </div>
                    <div class="p-4">
                        <a href="detail.html?id=${product.id}" class="block">
                            <h3 class="font-bold text-lg text-dark hover:text-primary-500 transition line-clamp-1">${product.title}</h3>
                        </a>
                        <div class="text-secondary-500 font-bold text-xl mt-1">${formatPrice(product.price)}</div>
                        <div class="flex justify-between items-center mt-2 text-sm text-gray-500">
                            <span><i class="fas fa-map-marker-alt mr-1"></i> ${product.city || 'Non spécifié'}</span>
                            <span><i class="far fa-eye mr-1"></i> ${product.views || 0}</span>
                        </div>
                        <div class="text-xs text-gray-400 mt-2">
                            <i class="far fa-clock mr-1"></i> ${formatDate(product.createdAt)}
                        </div>
                        ${product.status === 'pending' ? `
                            <div class="mt-3 p-2 bg-yellow-50 border border-yellow-200 rounded-lg text-xs text-yellow-700">
                                <i class="fas fa-info-circle mr-1"></i> En attente de validation par l'administrateur
                            </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        // ============================================
        // FILTRES
        // ============================================
        window.filterProducts = function(filter) {
            currentFilter = filter;
            
            // Mettre à jour les boutons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-primary-500', 'text-white');
                btn.classList.add('bg-gray-100', 'text-gray-700');
                if (btn.dataset.filter === filter) {
                    btn.classList.remove('bg-gray-100', 'text-gray-700');
                    btn.classList.add('bg-primary-500', 'text-white');
                }
            });
            
            renderProducts();
        };

        // ============================================
        // RECHERCHE
        // ============================================
        window.searchProducts = function(term) {
            searchTerm = term;
            renderProducts();
        };

        // ============================================
        // SUPPRIMER UN PRODUIT
        // ============================================
        window.deleteProduct = async function(productId) {
            if (!confirm('Voulez-vous vraiment supprimer ce produit ? Cette action est irréversible.')) {
                return;
            }

            try {
                await deleteDoc(doc(db, 'products', productId));
                showAlert('✅ Produit supprimé avec succès.', 'success');
                
                // Recharger les produits
                await loadProducts();
                
            } catch (error) {
                console.error('Erreur suppression:', error);
                showAlert('❌ Erreur lors de la suppression.', 'danger');
            }
        };

        // ============================================
        // IMPORT de getDoc
        // ============================================
        import { getDoc } from '../js/firebase-config.js';
    </script>
</body>
</html>
