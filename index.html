<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bénin Pi Market - Annonces Bénin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .active-chip-shadow {
            box-shadow: 0 4px 14px 0 rgba(26, 115, 232, 0.39);
        }
        .product-card-shadow {
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .whatsapp-float {
            position: fixed;
            bottom: 80px;
            right: 16px;
            z-index: 50;
            background: #25D366;
            color: white;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .whatsapp-float:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(37, 211, 102, 0.6);
        }
        .pi-badge {
            background: #f9a825;
            color: #fff;
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: 700;
        }
        .status-badge {
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: 600;
        }
        .status-badge.active { background: #d4edda; color: #155724; }
        .status-badge.pending { background: #fff3cd; color: #856404; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

    <!-- Mobile Container -->
    <div class="max-w-md mx-auto bg-white min-h-screen flex flex-col relative overflow-hidden">

        <!-- ========== TOP HEADER ========== -->
        <header class="px-5 pt-6 pb-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <!-- Logo / Avatar -->
                <div class="w-12 h-12 rounded-full overflow-hidden border-2 border-primary-500 flex items-center justify-center bg-primary-500 text-white font-bold text-xl">
                    BP
                </div>
                <div>
                    <p class="text-xs text-gray-400" id="greetingText">Bienvenue 👋</p>
                    <div class="flex items-center gap-1">
                        <h1 class="text-base font-bold" id="userDisplayName">Bénin Pi Market</h1>
                    </div>
                </div>
            </div>
            <!-- Actions -->
            <div class="flex items-center gap-2">
                <!-- Pi Rate -->
                <div class="hidden sm:flex items-center gap-1 bg-pi-50 px-3 py-1 rounded-full">
                    <span class="text-pi-500 font-bold text-xs">π</span>
                    <span class="text-xs text-gray-600" id="piRateDisplay">1 Pi = 1.000 FCFA</span>
                </div>
                <!-- Panier / Connexion -->
                <button onclick="window.location.href='auth/login.html'" 
                        class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center relative hover:bg-gray-200 transition" id="loginBtn">
                    <i class="fas fa-user text-gray-600"></i>
                </button>
                <button onclick="window.location.href='auth/register.html'" 
                        class="bg-primary-500 text-white text-xs px-3 py-2 rounded-xl font-semibold hover:bg-primary-600 transition" id="registerBtn">
                    S'inscrire
                </button>
                <!-- Menu utilisateur connecté -->
                <div id="userMenu" class="hidden relative group">
                    <button class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center hover:bg-gray-200 transition">
                        <i class="fas fa-user-circle text-2xl text-primary-500"></i>
                    </button>
                    <div class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50">
                        <div class="py-2">
                            <a href="dashboard/vendor.html" class="block px-4 py-2 hover:bg-gray-50 text-primary-500 font-medium">
                                <i class="fas fa-tachometer-alt w-5"></i> Dashboard
                            </a>
                            <a href="user/profile.html" class="block px-4 py-2 hover:bg-gray-50 transition">
                                <i class="fas fa-user w-5"></i> Profil
                            </a>
                            <a href="products/my-products.html" class="block px-4 py-2 hover:bg-gray-50 transition">
                                <i class="fas fa-box w-5"></i> Mes produits
                            </a>
                            <hr class="my-2">
                            <a href="#" onclick="window.logout()" class="block px-4 py-2 hover:bg-gray-50 text-red-500 transition">
                                <i class="fas fa-sign-out-alt w-5"></i> Déconnexion
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- ========== SEARCH ========== -->
        <section class="px-5 py-2 flex gap-3 items-center">
            <div class="relative flex-1">
                <span class="absolute inset-y-0 left-4 flex items-center text-gray-400">
                    <i class="fas fa-search text-sm"></i>
                </span>
                <input id="searchInput" 
                       class="w-full bg-white border border-gray-200 rounded-2xl py-3 pl-12 pr-4 text-sm focus:ring-2 focus:ring-primary-200 focus:border-primary-500 outline-none transition" 
                       placeholder="Que recherchez-vous ?" 
                       type="text"
                       onkeypress="if(event.key==='Enter') window.rechercher()">
            </div>
            <button onclick="window.rechercher()" 
                    class="w-12 h-12 bg-primary-500 border border-gray-100 rounded-2xl flex items-center justify-center text-white shadow-sm hover:bg-primary-600 transition">
                <i class="fas fa-arrow-right"></i>
            </button>
        </section>

        <!-- ========== CATEGORIES CHIPS ========== -->
        <section class="flex gap-2 overflow-x-auto px-5 py-3 no-scrollbar">
            <button onclick="window.location.href='products/list.html'" 
                    class="flex items-center gap-2 bg-primary-500 text-white px-4 py-2 rounded-xl whitespace-nowrap active-chip-shadow text-sm font-medium">
                <i class="fas fa-th-large text-sm"></i>
                Tous
            </button>
            <button onclick="window.location.href='products/list.html?category=Artisanat'" 
                    class="flex items-center gap-2 bg-white text-gray-600 px-4 py-2 rounded-xl border border-gray-200 whitespace-nowrap hover:border-primary-300 transition text-sm font-medium">
                🪵 Artisanat
            </button>
            <button onclick="window.location.href='products/list.html?category=Agriculture'" 
                    class="flex items-center gap-2 bg-white text-gray-600 px-4 py-2 rounded-xl border border-gray-200 whitespace-nowrap hover:border-primary-300 transition text-sm font-medium">
                🌾 Agriculture
            </button>
            <button onclick="window.location.href='products/list.html?category=Mode'" 
                    class="flex items-center gap-2 bg-white text-gray-600 px-4 py-2 rounded-xl border border-gray-200 whitespace-nowrap hover:border-primary-300 transition text-sm font-medium">
                👗 Mode
            </button>
            <button onclick="window.location.href='products/list.html?category=Immobilier'" 
                    class="flex items-center gap-2 bg-white text-gray-600 px-4 py-2 rounded-xl border border-gray-200 whitespace-nowrap hover:border-primary-300 transition text-sm font-medium">
                🏠 Immobilier
            </button>
            <button onclick="window.location.href='products/list.html?category=Services'" 
                    class="flex items-center gap-2 bg-white text-gray-600 px-4 py-2 rounded-xl border border-gray-200 whitespace-nowrap hover:border-primary-300 transition text-sm font-medium">
                🛠️ Services
            </button>
        </section>

        <!-- ========== PROMO BANNER ========== -->
        <section class="px-5 py-2">
            <div class="bg-gradient-to-r from-primary-500 to-primary-700 rounded-3xl p-5 relative overflow-hidden flex flex-col justify-between h-44">
                <div class="relative z-10 w-2/3">
                    <h2 class="text-white text-xl font-bold leading-tight">💰 Paiement en Crypto Pi</h2>
                    <p class="text-blue-100 text-xs mt-1">Transaction directe avec le vendeur via WhatsApp</p>
                    <a href="products/list.html" class="mt-3 inline-block bg-yellow-400 text-black px-5 py-2 rounded-xl font-bold text-xs">
                        <i class="fas fa-shopping-bag mr-2"></i> Voir les produits
                    </a>
                </div>
                <div class="absolute right-0 bottom-0 h-full w-1/2 flex items-center justify-center">
                    <div class="text-6xl opacity-20">🛒</div>
                </div>
            </div>
        </section>

        <!-- ========== PRODUITS RÉCENTS ========== -->
        <section class="px-5 py-4 pb-24">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">Produits récents</h3>
                <a href="products/list.html" class="text-primary-500 text-sm font-medium hover:underline">
                    Voir tout <i class="fas fa-arrow-right ml-1"></i>
                </a>
            </div>
            <div id="recentProducts" class="grid grid-cols-2 gap-3">
                <div class="col-span-2 text-center py-8 text-gray-500">
                    <i class="fas fa-spinner fa-spin text-2xl"></i>
                    <p class="mt-2 text-sm">Chargement...</p>
                </div>
            </div>
        </section>

        <!-- ========== BOUTON WHATSAPP FLOTTANT ========== -->
        <a href="https://wa.me/22997123456?text=Bonjour%2C%20je%20souhaite%20avoir%20plus%20d%27informations%20sur%20B%C3%A9nin%20Pi%20Market" 
           target="_blank"
           class="whatsapp-float">
            <i class="fab fa-whatsapp"></i>
        </a>

        <!-- ========== BOTTOM NAVIGATION ========== -->
        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-100 flex justify-between px-6 py-3 pb-4 z-50">
            <a href="index.html" class="flex flex-col items-center gap-0.5 text-primary-500">
                <i class="fas fa-home text-xl"></i>
                <span class="text-[10px] font-bold">Accueil</span>
            </a>
            <a href="products/list.html" class="flex flex-col items-center gap-0.5 text-gray-400 hover:text-gray-600 transition">
                <i class="fas fa-th-large text-xl"></i>
                <span class="text-[10px] font-medium">Produits</span>
            </a>
            <a href="categories/all.html" class="flex flex-col items-center gap-0.5 text-gray-400 hover:text-gray-600 transition">
                <i class="fas fa-tags text-xl"></i>
                <span class="text-[10px] font-medium">Catégories</span>
            </a>
            <a href="#" onclick="window.location.href='auth/login.html'" class="flex flex-col items-center gap-0.5 text-gray-400 hover:text-gray-600 transition" id="navProfile">
                <i class="fas fa-user text-xl"></i>
                <span class="text-[10px] font-medium">Profil</span>
            </a>
        </nav>

        <!-- iPhone indicator bar -->
        <div class="absolute bottom-1 left-1/2 -translate-x-1/2 w-1/3 h-1 bg-black rounded-full opacity-20"></div>

    </div>

    <!-- ========== JAVASCRIPT ========== -->
    <script type="module">
        import { auth, onAuthStateChanged, db, collection, getDocs, query, where, orderBy, limit, doc, getDoc } from './js/firebase-config.js';
        import { logout } from './js/auth.js';
        import { displayProducts } from './js/utils.js';
        import { getExchangeRate } from './js/pi-utils.js';

        window.logout = logout;

        // ============================================
        // AUTHENTIFICATION
        // ============================================
        onAuthStateChanged(auth, (user) => {
            const loginBtn = document.getElementById('loginBtn');
            const registerBtn = document.getElementById('registerBtn');
            const userMenu = document.getElementById('userMenu');
            const userDisplay = document.getElementById('userDisplayName');
            const greeting = document.getElementById('greetingText');
            const navProfile = document.getElementById('navProfile');

            if (user) {
                // Connecté
                loginBtn.style.display = 'none';
                registerBtn.style.display = 'none';
                userMenu.classList.remove('hidden');
                
                getDoc(doc(db, 'users', user.uid)).then((docSnap) => {
                    if (docSnap.exists()) {
                        const userData = docSnap.data();
                        userDisplay.textContent = `${userData.prenom} ${userData.nom}`;
                        greeting.textContent = `👋 Bonjour ${userData.prenom}`;
                    }
                }).catch(() => {});
                
                if (navProfile) navProfile.href = 'dashboard/vendor.html';
                
            } else {
                // Non connecté
                loginBtn.style.display = 'flex';
                registerBtn.style.display = 'flex';
                userMenu.classList.add('hidden');
                userDisplay.textContent = 'Bénin Pi Market';
                greeting.textContent = 'Bienvenue 👋';
                if (navProfile) navProfile.href = 'auth/login.html';
            }
        });

        // ============================================
        // TAUX PI
        // ============================================
        const rate = getExchangeRate();
        document.getElementById('piRateDisplay').textContent = `1 Pi = ${rate.toLocaleString()} FCFA`;

        // ============================================
        // CHARGER PRODUITS RÉCENTS
        // ============================================
        async function loadRecentProducts() {
            try {
                const q = query(
                    collection(db, 'products'),
                    where('status', '==', 'published'),
                    orderBy('createdAt', 'desc'),
                    limit(4)
                );
                const querySnapshot = await getDocs(q);
                const products = [];
                querySnapshot.forEach((doc) => {
                    products.push({ id: doc.id, ...doc.data() });
                });
                displayProducts(products, 'recentProducts');
            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('recentProducts').innerHTML = `
                    <div class="col-span-2 text-center py-8 text-gray-500">
                        <i class="fas fa-exclamation-circle text-2xl block mb-2"></i>
                        <p class="text-sm">Erreur de chargement</p>
                    </div>
                `;
            }
        }

        // ============================================
        // RECHERCHE
        // ============================================
        window.rechercher = function() {
            const searchTerm = document.getElementById('searchInput')?.value;
            if (searchTerm?.trim()) {
                window.location.href = `products/list.html?search=${encodeURIComponent(searchTerm.trim())}`;
            }
        };

        // ============================================
        // INITIALISATION
        // ============================================
        loadRecentProducts();

        console.log('✅ Bénin Pi Market - Accueil moderne chargé !');
    </script>
</body>
</html>
